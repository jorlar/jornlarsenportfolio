services:
  traefik:
    # the official v3 traefik docker image latest is 3:2
    image: traefik:v3.2
    # enables the web ui and tells traefik to listen to docker
    command: 
      - "--log.level=debug"
      - "--providers.docker"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=jorn.larsen@jotun-utvikling.no"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - mode: host
        protocol: tcp
        published: 80
        target: 80
      - mode: host
        protocol: tcp
        published: 443
        target: 443
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    # build: "." #only use when local
    image: jorlar88/jornlarsen:${GIT_COMMIT_HASH:-latest} #use for live build -> docker io
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.web.loadbalancer.server.port=5173"
      - "traefik.http.routers.web.rule=host(`jotunutvikling.dev`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=myresolver"
    deploy:
      #mode: replicated
      #replicas: 3
      update_config:
        order: start-first
volumes:
  letsencrypt: